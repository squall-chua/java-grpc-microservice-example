syntax = "proto3";

package auth.v1;

option java_multiple_files = true;
option java_package = "com.example.auth.v1";
option java_outer_classname = "AuthOptionsProto";

import "google/protobuf/descriptor.proto";

message AuthRule {
  repeated string required_scopes = 1;
  repeated string required_roles = 2;
}

extend google.protobuf.MethodOptions {
  AuthRule rule = 50000;
}
